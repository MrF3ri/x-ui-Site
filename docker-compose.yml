services:
  app:
    build: .
    container_name: garudapanel-app
    restart: unless-stopped
    environment:
      APP_PORT: "8080"
      APP_ENV: "development"
      JWT_SECRET: "dev-secret"
      DATABASE_DSN: "postgres://garuda:garuda@postgres:5432/garudapanel?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      MINIO_ENDPOINT: "minio:9000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks: [garuda]

  postgres:
    image: postgres:16-alpine
    container_name: garudapanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: garudapanel
      POSTGRES_USER: garuda
      POSTGRES_PASSWORD: garuda
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garuda -d garudapanel"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [garuda]

  redis:
    image: redis:7-alpine
    container_name: garudapanel-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [garuda]

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: garudapanel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks: [garuda]

  caddy:
    image: caddy:2.9-alpine
    container_name: garudapanel-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks: [garuda]

networks:
  garuda:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
